<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8" /></head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search)
      const code  = params.get('code')
      const error = params.get('error')

      if (code) {
        window.location.replace('/login?google_code=' + encodeURIComponent(code))
      } else {
        window.location.replace('/login?google_error=' + encodeURIComponent(error ?? 'unknown'))
      }
    </script>
  </body>
</html>
