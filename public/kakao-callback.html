<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8" /></head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search)
      const code   = params.get('code')
      const error  = params.get('error')

      // window.opener is nulled by Kakao's COOP: same-origin header.
      // Use localStorage + storage event as a reliable alternative.
      localStorage.setItem('kakao_oauth_result', JSON.stringify({
        code: code ?? null,
        error: error ?? (code ? null : 'unknown'),
        ts: Date.now(),
      }))
      window.close()
    </script>
  </body>
</html>
