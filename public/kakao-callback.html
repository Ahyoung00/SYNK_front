<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8" /></head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search)
      const code  = params.get('code')
      const error = params.get('error')

      if (code) {
        sessionStorage.setItem('oauth_pending', JSON.stringify({ provider: 'kakao', code }))
      } else {
        sessionStorage.setItem('oauth_pending', JSON.stringify({ provider: 'kakao', error: error ?? 'unknown' }))
      }
      // 앱 루트로 돌아가기
      window.location.replace('/')
    </script>
  </body>
</html>
