<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Mobile viewport: disable zoom, respect safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Theme color for browser chrome / Android status bar -->
    <meta name="theme-color" content="#0f0f14" />

    <!-- iOS web-app appearance -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SYNK" />

    <title>SYNK</title>

    <!-- Pretendard 가변폰트 (한글 본문) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async></script>

    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
  </head>
  <body>
    <!-- iOS 인앱 브라우저: Step 안내 화면 표시 (Android는 그냥 앱 로드) -->
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        var isIOS   = /iPhone|iPad|iPod/i.test(ua);
        var isInApp = /KAKAOTALK|KAKAO|Line\/|Instagram|FBAN|FBAV|Twitter|Snapchat|Musical/i.test(ua);
        if (!isIOS || !isInApp) return;

        var S = function(el, css) { el.style.cssText = css; };
        var E = function(tag, css, html) {
          var el = document.createElement(tag);
          if (css)  S(el, css);
          if (html) el.innerHTML = html;
          return el;
        };

        S(document.documentElement, 'min-height:100%;margin:0;padding:0;');
        S(document.body, [
          'min-height:100vh;margin:0;padding:0;box-sizing:border-box;overflow-y:auto;',
          'background:linear-gradient(160deg,#0f1a3a 0%,#0a1128 60%,#060c1e 100%);',
          'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;',
          'color:#fff;display:flex;flex-direction:column;align-items:center;',
          'padding:48px 20px 36px;gap:0;',
        ].join(''));
        document.body.innerHTML = '';

        /* 아이콘 + 앱명 */
        var icon = E('img', 'width:80px;height:80px;border-radius:20px;margin-bottom:14px;');
        icon.src = '/icon-192.png'; icon.alt = 'SYNK';
        document.body.appendChild(icon);
        document.body.appendChild(E('p', 'font-size:22px;font-weight:900;margin:0 0 4px;', 'SYNK'));
        document.body.appendChild(E('p', 'font-size:13px;color:rgba(255,255,255,.45);margin:0 0 28px;', '친구들과 하루를 기록하는 앱'));

        /* 상단 안내 카드 */
        var card = E('div', [
          'width:100%;max-width:360px;border-radius:18px;',
          'background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);',
          'padding:20px 18px;margin-bottom:12px;text-align:center;',
        ].join(''));
        card.appendChild(E('p', 'font-size:18px;font-weight:800;margin:0 0 8px;line-height:1.35;', 'Safari로 열어야<br>앱 설치가 가능해요'));
        card.appendChild(E('p', 'font-size:13px;color:rgba(255,255,255,.5);margin:0;line-height:1.6;', '지금 보이는 브라우저는 인앱 브라우저예요.<br>아래 3단계를 따라 설치해 주세요!'));
        document.body.appendChild(card);

        /* 스텝 카드 */
        function step(iconSvg, iconBg, badgeColor, badgeText, title, desc) {
          var wrap = E('div', [
            'width:100%;max-width:360px;border-radius:16px;',
            'background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);',
            'padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;',
          ].join(''));
          wrap.appendChild(E('div', [
            'width:48px;height:48px;border-radius:14px;flex-shrink:0;',
            'background:' + iconBg + ';display:flex;align-items:center;justify-content:center;',
          ].join(''), iconSvg));
          var right = E('div', 'flex:1;min-width:0;padding-top:2px;');
          right.appendChild(E('span', [
            'display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;margin-bottom:5px;',
            'color:' + badgeColor + ';border:1.5px solid ' + badgeColor + ';border-radius:6px;padding:1px 7px;',
          ].join(''), badgeText));
          right.appendChild(E('p', 'font-size:14px;font-weight:700;margin:0 0 4px;', title));
          right.appendChild(E('p', 'font-size:12px;color:rgba(255,255,255,.45);margin:0;line-height:1.5;', desc));
          wrap.appendChild(right);
          return wrap;
        }

        var compassSvg = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>';
        var shareSvg   = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
        var plusSvg    = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';

        document.body.appendChild(step(compassSvg, 'rgba(59,130,246,.6)', '#60a5fa', 'STEP 01', 'Safari로 이동하세요', '현재 브라우저에서는 앱 설치가 불가능해요. Safari 앱을 열어주세요.'));
        document.body.appendChild(step(shareSvg,   'rgba(59,130,246,.5)', '#60a5fa', 'STEP 02', '하단 공유 버튼 탭', 'Safari 하단 가운데의 ↑ 공유 버튼을 탭하세요.'));
        document.body.appendChild(step(plusSvg,    'rgba(59,130,246,.6)', '#60a5fa', 'STEP 03', '홈 화면에 추가', '메뉴에서 <strong style="color:#fff">"홈 화면에 추가"</strong>를 탭하면 앱이 설치돼요.'));

        document.body.appendChild(E('p', 'font-size:11px;color:rgba(255,255,255,.2);margin:16px 0 0;text-align:center;', '설치 후에도 synk-front.vercel.app 으로 접속할 수 있어요'));
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
